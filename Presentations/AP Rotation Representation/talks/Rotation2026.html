</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="physicalSci" lang="C" data-marpit-pagination="43" style="" data-marpit-pagination-total="81" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-marpit-fragments="5" data-paginate="true" data-theme="physicalSci" lang="C" data-marpit-pagination="44" style="--paginate:true;--theme:physicalSci;" data-marpit-pagination-total="81">
<h1 id="moment-of-inertia-1">Moment of Inertia</h1>
<ul>
<li data-marpit-fragment="1">the rotational analog of mass for linear motion</li>
<li data-marpit-fragment="2">it is related to the mass and the location of the mass
<ul>
<li data-marpit-fragment="3">closer the mass is to the rotational axis, the lower the moment of inertia (easier to spin)</li>
</ul>
</li>

<h1 id="example">Example</h1>
<div class='columns'>
<div>
<p>A potter is shaping a bowl out of clay on a potter's wheel initially rotating at a constant angular speed of 22.4 rad/sec. A 1.40-N friction force between her hands and the clay slows the system to a stop. The wheel is a 11.5-kg disk with a radius of 26.2 cm. The bowl has a moment of inertia of 0.074 kg•m<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="0.988ex" height="1.887ex" role="img" focusable="false" viewBox="0 -833.9 436.6 833.9"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"></g><g data-mml-node="mn" transform="translate(33,363) scale(0.707)"><path data-c="32" d="M109 429Q82 429 66 447T50 491Q50 562 103 614T235 666Q326 666 387 610T449 465Q449 422 429 383T381 315T301 241Q265 210 201 149L142 93L218 92Q375 92 385 97Q392 99 409 186V189H449V186Q448 183 436 95T421 3V0H50V19V31Q50 38 56 46T86 81Q115 113 136 137Q145 147 170 174T204 211T233 244T261 278T284 308T305 340T320 369T333 401T340 431T343 464Q343 527 309 573T212 619Q179 619 154 602T119 569T109 550Q109 549 114 549Q132 549 151 535T170 489Q170 464 154 447T109 429Z"></path></g></g></g></g></svg></mjx-container> around the center axis of the wheel.</p>
</div>

<li data-marpit-fragment="3">Unlike energy, angular momentum is conserved <em>separately</em> from linear momentum. (Do not combine them in a single equation)</li>
<li data-marpit-fragment="4">Angular momentum is a vector – angular momentums in the same sense add, angular momentums in opposite senses subtract.</li>

<h1 id="conservation-of-angular-momentum">Conservation of angular momentum:</h1>
<ul>
<li data-marpit-fragment="1">Conservation of Angular Momentum is used when a translating object interacts with a rotating one.
<ul>
<li data-marpit-fragment="2">Examples: Throwing a ball from a merry-go-round, bat hitting a baseball.</li>
</ul>
</li>
<li data-marpit-fragment="3">Conservation of Angular Momentum is also used for a single rotating object changing shape.
<ul>
<li data-marpit-fragment="4">Example: A figure skater pulls in her arms. Moment of inertia decreases so angular velocity must increase to keep angular momentum constant.</li>
</ul>
</li>
</ul>
</section>

<h1 id="impulse">Impulse</h1>
<ul>
<li data-marpit-fragment="1">The impulse-momentum theorem can be written for angular momentum, too.
<ul>

<p>A solid sphere rolls without slipping along a track shaped as shown at right. It<br />
starts from rest at point A and is moving vertically when it leaves the track at<br />
point B.</p>
<p>At its highest point while in the air, will the sphere be (a) above, (b) below,<br />
or (c) at the same height as point A? _____</p>
<p>Explain your reasoning.</p>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-theme="physicalSci" lang="C" data-marpit-pagination="76" style="" data-marpit-pagination-total="81" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="right"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-theme="physicalSci" lang="C" data-marpit-pagination="77" style="--paginate:true;--theme:physicalSci;" data-marpit-pagination-total="81">
<p>In each case, a 1-kg object is released from rest on a ramp at a height of 2 m from the bottom. All of the spheres roll without slipping, and the blocks slide without friction.</p>
<p><img src="image-9.png" alt="center" style="width:950px;" /></p>
<p>Rank the maximum height of the objects on the other side of the ramp.</p>
<p>Explain your reasoning</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-theme="physicalSci" lang="C" data-marpit-pagination="78" style="--paginate:true;--theme:physicalSci;" data-marpit-pagination-total="81">
<p>In each case, a 1-kg object is released from rest on a ramp at a height of 2 m from the bottom. All of the spheres roll without slipping, and the blocks slide without friction. The ramps are identical in Cases A and C. The ramps in Cases B and D are identical and are not as steep as the others.</p>
<p><img src="image-10.png" alt="center" /></p>
<p>Rank the speed of the objects when they reach the horizontal surface at the bottom of the ramp.</p>
<p>Explain your reasoning.</p>
</section>
