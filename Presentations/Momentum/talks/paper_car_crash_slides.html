<h1 id="paper-car-crash">Paper Car Crash</h1>
<p><strong>Crashworthiness by Design</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="2" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="a-thought-experiment">A Thought Experiment</h2>
<p>Imagine you trip and fall.</p>
<p><strong>Scenario A:</strong> You land on a concrete sidewalk.</p>
<p><strong>Scenario B:</strong> You land on soft sand.</p>
<p>Which one hurts more? Why?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="3" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="same-impulse-different-force">Same Impulse, Different Force</h2>
<p>In both cases, your momentum changes by the <strong>same amount</strong> — you go from moving to stopped.</p>
<p>But the <strong>time</strong> over which you stop is very different.</p>
<ul>
<li>Concrete: you stop <strong>fast</strong> → <strong>large force</strong></li>
<li>Sand: you stop <strong>slowly</strong> → <strong>small force</strong></li>
</ul>
<blockquote>
<p>The sand &quot;gives&quot; during the collision, spreading the force over a longer time.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-class="equation" data-theme="momentum2" lang="C" class="equation" data-marpit-pagination="4" style="--paginate:true;--class:equation;--theme:momentum2;" data-marpit-pagination-total="16">

<p>If the impulse (<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.439ex;" xmlns="http://www.w3.org/2000/svg" width="3.023ex" height="2.059ex" role="img" focusable="false" viewBox="0 -716 1336 910"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="394" d="M51 0Q46 4 46 7Q46 9 215 357T388 709Q391 716 416 716Q439 716 444 709Q447 705 616 357T786 7Q786 4 781 0H51ZM507 344L384 596L137 92L383 91H630Q630 93 507 344Z"></path></g><g data-mml-node="mi" transform="translate(833,0)"><path data-c="1D45D" d="M23 287Q24 290 25 295T30 317T40 348T55 381T75 411T101 433T134 442Q209 442 230 378L240 387Q302 442 358 442Q423 442 460 395T497 281Q497 173 421 82T249 -10Q227 -10 210 -4Q199 1 187 11T168 28L161 36Q160 35 139 -51T118 -138Q118 -144 126 -145T163 -148H188Q194 -155 194 -157T191 -175Q188 -187 185 -190T172 -194Q170 -194 161 -194T127 -193T65 -192Q-5 -192 -24 -194H-32Q-39 -187 -39 -183Q-37 -156 -26 -148H-6Q28 -147 33 -136Q36 -130 94 103T155 350Q156 355 156 364Q156 405 131 405Q109 405 94 377T71 316T59 280Q57 278 43 278H29Q23 284 23 287ZM178 102Q200 26 252 26Q282 26 310 49T356 107Q374 141 392 215T411 325V331Q411 405 350 405Q339 405 328 402T306 393T286 380T269 365T254 350T243 336T235 326L232 322Q232 321 229 308T218 264T204 212Q178 106 178 102Z"></path></g></g></g></svg></mjx-container>) is the same, then:</p>
<ul>
<li><strong>Short time</strong> → <strong>large force</strong></li>
<li><strong>Long time</strong> → <strong>small force</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-class="impact" data-theme="momentum2" lang="C" class="impact" data-marpit-pagination="5" style="--paginate:true;--class:impact;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="how-do-real-cars-use-this">How Do Real Cars Use This?</h2>
<p>Vehicle engineers face the same physics.</p>
<p>A car going 60 mph has a lot of momentum. In a crash, that momentum drops to zero.</p>
<p>Engineers can't change the impulse — but they <strong>can</strong> change the <strong>time</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="crumple-zones">Crumple Zones</h2>
<p>The front of a car is designed to <strong>collapse</strong> on impact.</p>
<p>As the front end crumples, the car takes <strong>longer to stop</strong>.</p>
<p>Longer stopping time → <strong>smaller average force</strong> on the passenger compartment.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="the-safety-cage">The Safety Cage</h2>
<p>Behind the crumple zone, the passenger compartment is built to be <strong>rigid and strong</strong>.</p>
<p>This is the <strong>safety cage</strong> — it's designed to keep its shape even when the front and rear of the car are destroyed.</p>
<p>The crumple zone absorbs energy. The safety cage protects the people inside.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="seat-belts">Seat Belts</h2>
<p>During a crash, the car stops — but <strong>you</strong> keep moving (inertia).</p>
<p>A seat belt connects you to the safety cage so you <strong>slow down with the car</strong> instead of slamming into the dashboard or windshield.</p>
<p>Without a seat belt, your body experiences its own separate collision — at full speed, against something hard.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="9" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="putting-it-all-together">Putting It All Together</h2>
<p>A crashworthy car has three things working together:</p>
<ol>
<li><strong>Crumple zone</strong> — increases stopping time, reduces force</li>
<li><strong>Safety cage</strong> — rigid compartment that holds its shape</li>
<li><strong>Seat belt</strong> — keeps the occupant attached to the cage</li>
</ol>
<blockquote>
<p>If any one of these fails, the occupant is in trouble.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-class="challenge" data-theme="momentum2" lang="C" class="challenge" data-marpit-pagination="10" style="--paginate:true;--class:challenge;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="your-challenge">Your Challenge</h2>
<p>Design and build a paper car that protects a <strong>raw egg</strong> during a head-on collision with a concrete block.</p>
<p>Your car will roll down a ramp and crash into a wall.</p>
<p>The egg must survive.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-class="rules" data-theme="momentum2" lang="C" class="rules" data-marpit-pagination="11" style="--paginate:true;--class:rules;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="the-rules">The Rules</h2>
<ul>
<li><strong>Materials:</strong> 2 sheets of copy paper, tape (masking or scotch), and teacher-provided wheels, axles, and straw housing</li>
<li>Your car must <strong>fit inside the gutter ramp</strong> and roll freely</li>
<li><strong>Minimum mass</strong> (without egg): 40 g</li>
<li>No cardboard, stickers, or paint</li>
<li>The straw can <strong>only</strong> be cut up and used as axle housing</li>
<li>The egg must be <strong>easy to remove</strong> for inspection after each crash</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="12" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="design-questions-to-consider">Design Questions to Consider</h2>
<p>Before you start building, think about these:</p>
<ul>
<li>Should the front of your car be <strong>rigid</strong> or should it <strong>collapse</strong> on impact?</li>
<li>Should the egg sit <strong>loosely</strong> in the car, or be <strong>secured</strong> in place?</li>
<li>How do you make the front <strong>weak enough to crumple</strong> but the passenger area <strong>strong enough to survive</strong>?</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="13" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="the-competition">The Competition</h2>
<p><strong>Round 1:</strong> Ramp starting height at 200 cm — egg survives? Move on.</p>
<p><strong>Round 2:</strong> Ramp raised to 220 cm — higher speed, more momentum.</p>
<p><strong>Round 3:</strong> Ramp raised to 240 cm — even faster.</p>
<p>Cars are eliminated when the egg cracks or breaks.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-class="equation" data-theme="momentum2" lang="C" class="equation" data-marpit-pagination="14" style="--paginate:true;--class:equation;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="what-youll-calculate">What You'll Calculate</h2>
<p>After the competition, you will:</p>
<ul>
<li>Measure your car's <strong>mass</strong> and the <strong>track distance</strong></li>
<li>Time a practice run to find <strong>average velocity</strong></li>
<li>Calculate your car's <strong>momentum</strong> at impact</li>
</ul>
<p><mjx-container class="MathJax" jax="SVG" display="true" style="margin: 0;"><svg style="vertical-align: -0.439ex; display: block; width: 100%; height: auto; max-height: 1.758ex;" xmlns="http://www.w3.org/2000/svg" width="8.873ex" height="1.758ex" role="img" focusable="false" viewBox="0 -583 3922 777"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D45D" d="M23 287Q24 290 25 295T30 317T40 348T55 381T75 411T101 433T134 442Q209 442 230 378L240 387Q302 442 358 442Q423 442 460 395T497 281Q497 173 421 82T249 -10Q227 -10 210 -4Q199 1 187 11T168 28L161 36Q160 35 139 -51T118 -138Q118 -144 126 -145T163 -148H188Q194 -155 194 -157T191 -175Q188 -187 185 -190T172 -194Q170 -194 161 -194T127 -193T65 -192Q-5 -192 -24 -194H-32Q-39 -187 -39 -183Q-37 -156 -26 -148H-6Q28 -147 33 -136Q36 -130 94 103T155 350Q156 355 156 364Q156 405 131 405Q109 405 94 377T71 316T59 280Q57 278 43 278H29Q23 284 23 287ZM178 102Q200 26 252 26Q282 26 310 49T356 107Q374 141 392 215T411 325V331Q411 405 350 405Q339 405 328 402T306 393T286 380T269 365T254 350T243 336T235 326L232 322Q232 321 229 308T218 264T204 212Q178 106 178 102Z"></path></g><g data-mml-node="mo" transform="translate(780.8,0)"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="mi" transform="translate(1836.6,0)"><path data-c="1D45A" d="M21 287Q22 293 24 303T36 341T56 388T88 425T132 442T175 435T205 417T221 395T229 376L231 369Q231 367 232 367L243 378Q303 442 384 442Q401 442 415 440T441 433T460 423T475 411T485 398T493 385T497 373T500 364T502 357L510 367Q573 442 659 442Q713 442 746 415T780 336Q780 285 742 178T704 50Q705 36 709 31T724 26Q752 26 776 56T815 138Q818 149 821 151T837 153Q857 153 857 145Q857 144 853 130Q845 101 831 73T785 17T716 -10Q669 -10 648 17T627 73Q627 92 663 193T700 345Q700 404 6 </foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="momentum2" lang="C" data-marpit-pagination="15" style="--paginate:true;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="the-timeline">The Timeline</h2>
<p><strong>Day 1</strong> — Brainstorm and build</p>
<ul>
<li>Sketch at least <strong>two different designs</strong> before you start</li>
<li>Build your car</li>
</ul>
<p><strong>Day 2</strong> — Test and crash</p>
<ul>
<li>Measure mass, check specs</li>
<li>Practice runs (no egg, no wall)</li>
<li>Crash competition with eggs</li>
</ul>
<p><strong>Day 3</strong> — Analysis (if needed)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-class="go" data-theme="momentum2" lang="C" class="go" data-marpit-pagination="16" style="--paginate:true;--class:go;--theme:momentum2;" data-marpit-pagination-total="16">
<h2 id="before-you-start">Before You Start</h2>
<p>Two sketches in your notebook first — <strong>then</strong> build.</p>
<p>Think about the physics. Every design choice should connect back to <strong>impulse, momentum, and force</strong>.</p>
<p><strong>Go!</strong></p>
</section>
