<h1 is="marp-h1" data-auto-scaling id="spark-timer-acceleration-lab">Spark Timer Acceleration Lab </h1>
<h2 id="finding-acceleration-from-position-and-velocity-graphs"><strong>Finding Acceleration from Position and Velocity Graphs</strong></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="6" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="the-essential-question">The Essential Question</h2>
<p>What is the <strong>acceleration</strong> of your fan cart (or pull-back truck)?</p>
<blockquote>
<p>By the end of the lab, you should be able to answer this with a number <em>and</em> with graph evidence to back it up.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="7" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="quick-refresher-acceleration">Quick Refresher: Acceleration</h2>
<p><strong>Acceleration</strong> = how quickly velocity is changing.</p>
<ul>
<li>Velocity <strong>constant</strong> → acceleration is <strong>zero</strong></li>
<li>Velocity <strong>increasing</strong> → acceleration is <strong>positive</strong> (speeding up)</li>
<li>Velocity <strong>decreasing</strong> → acceleration is <strong>negative</strong> (slowing down)</li>
</ul>
<p>Today we find acceleration by studying how <em>position</em> and <em>velocity</em> change over time.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="8" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="your-tool-the-spark-timer">Your Tool: The Spark Timer</h2>
<p>A <strong>spark timer</strong> leaves a dot on paper tape at perfectly regular time intervals.</p>
<ul>
<li>Our timer runs at <strong>60 Hz</strong> → one dot every <strong>1/60 s</strong> ≈ <strong>0.0167 s</strong></li>
<li>The cart drags tape through the timer as it moves</li>
<li>The spacing of the dots tells you about the motion</li>
</ul>
<blockquote>
<p>Dots <strong>evenly spaced</strong> → constant velocity.<br />
Dots <strong>getting farther apart</strong> → accelerating.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-class="impact" data-theme="physicalSci" lang="C" class="impact" data-marpit-pagination="9" style="--paginate:true;--class:impact;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="two-parts">Two Parts</h2>
<p><strong>Part 1:</strong> Collect spark-timer data. Graph <em>position vs. time</em> <strong>by hand</strong>.</p>
<p><strong>Part 2:</strong> Enter your data into <strong>Graphical Analysis</strong>. Use the <em>tangent tool</em> to find velocities, then graph <em>velocity vs. time</em> to find your <strong>acceleration</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="10" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="part-1-reading-the-tape">Part 1: Reading the Tape</h2>
<ol>
<li>Pick a <strong>clear starting dot</strong>. Label it <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.186ex;" xmlns="http://www.w3.org/2000/svg" width="4.965ex" height="1.692ex" role="img" focusable="false" viewBox="0 -666 2194.6 748"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D461" d="M26 385Q19 392 19 395Q19 399 22 411T27 425Q29 430 36 430T87 431H140L159 511Q162 522 166 540T173 566T179 586T187 603T197 615T211 624T229 626Q247 625 254 615T261 596Q261 589 252 549T232 470L222 433Q222 431 272 431H323Q330 424 330 420Q330 398 317 385H210L174 240Q135 80 135 68Q135 26 162 26Q197 26 230 60T283 144Q285 150 288 151T303 153H307Q322 153 322 145Q322 142 319 133Q314 117 301 95T267 48T216 6T155 -11Q125 -11 98 4T59 56Q57 64 57 83V101L92 241Q127 382 128 383Q128 385 77 385H26Z"></path></g><g data-mml-node="mo" transform="translate(638.8,0)"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="mn" transform="translate(1694.6,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path></g></g></g></svg></mjx-container>, position <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.186ex;" xmlns="http://www.w3.org/2000/svg" width="3.52ex" height="1.692ex" role="img" focusable="false" viewBox="0 -666 1555.8 748"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="mn" transform="translate(1055.8,0)"><path data-c="30" d="M96 585Q152 666 249 666Q297 666 345 640T423 548Q460 465 460 320Q460 165 417 83Q397 41 362 16T301 -15T250 -22Q224 -22 198 -16T137 16T82 83Q39 165 39 320Q39 494 96 585ZM321 597Q291 629 250 629Q208 629 178 597Q153 571 145 525T137 333Q137 175 145 125T181 46Q209 16 250 16Q290 16 318 46Q347 76 354 130T362 333Q362 478 354 524T321 597Z"></path></g></g></g></svg></mjx-container>.</li>
<li>Measure the position of each later dot <strong>from the starting dot</strong> — not from the previous one.</li>
<li>Record time and position in your lab notebook.</li>
</ol>
<blockquote>
<p>You can use every 2nd, 3rd, or 5th dot to keep your data manageable. Stay consistent, and adjust your time values accordingly.</p>
</blockquote>

<h2 id="part-1-the-hand-drawn-graph">Part 1: The Hand-Drawn Graph</h2>
<p>Plot <strong>position (cm)</strong> on the <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.464ex;" xmlns="http://www.w3.org/2000/svg" width="1.109ex" height="1.464ex" role="img" focusable="false" viewBox="0 -442 490 647"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D466" d="M21 287Q21 301 36 335T84 406T158 442Q199 442 224 419T250 355Q248 336 247 334Q247 331 231 288T198 191T182 105Q182 62 196 45T238 27Q261 27 281 38T312 61T339 94Q339 95 344 114T358 173T377 247Q415 397 419 404Q432 431 462 431Q475 431 483 424T494 412T496 403Q496 390 447 193T391 -23Q363 -106 294 -155T156 -205Q111 -205 77 -183T43 -117Q43 -95 50 -80T69 -58T89 -48T106 -45Q150 -45 150 -87Q150 -107 138 -122T115 -142T102 -147L99 -148Q101 -153 118 -160T152 -167H160Q177 -167 186 -165Q219 -156 247 -127T290 -65T313 -9T321 21L315 17Q309 13 296 6T270 -6Q250 -11 231 -11Q185 -11 150 11T104 82Q103 89 103 113Q103 170 138 262T173 379Q173 380 173 381Q173 390 173 393T169 400T158 404H154Q131 404 112 385T82 344T65 302T57 280Q55 278 41 278H27Q21 284 21 287Z"></path></g></g></g></svg></mjx-container>-axis and <strong>time (s)</strong> on the <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.294ex" height="1.025ex" role="img" focusable="false" viewBox="0 -442 572 453"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D465" d="M52 289Q59 331 106 386T222 442Q257 442 286 424T329 379Q371 442 430 442Q467 442 494 420T522 361Q522 332 508 314T481 292T458 288Q439 288 427 299T415 328Q415 374 465 391Q454 404 425 404Q412 404 406 402Q368 386 350 336Q290 115 290 78Q290 50 306 38T341 26Q378 26 414 59T463 140Q466 150 469 151T485 153H489Q504 153 504 145Q504 144 502 134Q486 77 440 33T333 -11Q263 -11 227 52Q186 -10 133 -10H127Q78 -10 57 16T35 71Q35 103 54 123T99 143Q142 143 142 101Q142 81 130 66T107 46T94 41L91 40Q91 39 97 36T113 29T132 26Q168 26 194 71Q203 87 217 139T245 247T261 313Q266 340 266 352Q266 380 251 392T217 404Q177 404 142 372T93 290Q91 281 88 280T72 278H58Q52 284 52 289Z"></path></g></g></g></svg></mjx-container>-axis.</p>
<ul>
<li>Label both axes — variable name <strong>and</strong> units</li>
<li>Choose a scale that fills most of the page</li>
<li>Draw a <strong>smooth curve</strong> through the points — do <em>not</em> connect the dots with straight segments</li>
</ul>
<p>Expect a <strong>curve</strong> if your object is accelerating.</p>

<h2 id="part-2-into-graphical-analysis">Part 2: Into Graphical Analysis</h2>
<ol>
<li>Create two columns: <strong>Time</strong> and <strong>Position</strong></li>
<li>Enter the same data you used for your hand graph</li>
<li>Plot <strong>Position vs. Time</strong> — it should come out as a curve, not a straight line</li>
</ol>

<h2 id="safety-first">Safety First</h2>
<ul>
<li>Spark timers use <strong>high voltage</strong>. Keep fingers and metal objects away from the contacts while the timer is running.</li>
<li><strong>Turn the timer off</strong> before loading or unloading tape.</li>
<li>Keep the tape path clear so it doesn't whip or catch.</li>
<li>Don't let carts launch off the lab bench.</li>
</ul>
</section>

<h2 id="position-direction-and-negative-motion"><strong>Position, Direction, and Negative Motion</strong></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="32" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="quick-recap-lab-1">Quick Recap: Lab 1</h2>
<p>In the first Dune Buggy Lab, you:</p>
<ul>
<li>Measured <strong>distance</strong> at different times</li>
<li>Created a <strong>distance vs. time</strong> graph</li>
<li>Found the equation of your best-fit line</li>
<li>Used your equation to <strong>predict</strong> a time</li>
</ul>
<p>Your graph went <strong>upward</strong> and your slope was <strong>positive</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="33" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="a-question-about-lab-1">A Question About Lab 1</h2>
<p>You sent your buggy down the hallway and measured how far it went.</p>
<p>But think about this: if two buggies start at the same spot and travel the <strong>same distance</strong> but in <strong>opposite directions</strong>...</p>
<p>Are they in the same place?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="34" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="distance-vs-position">Distance vs. Position</h2>
<table>
<thead>
<tr>
<th></th>
<th>Distance</th>
<th>Position</th>
</tr>
</thead>
<tbody>
<tr>
<td>Answers</td>
<td><em>How far?</em></td>
<td><em>Where?</em></td>
</tr>
<tr>
<td>Direction?</td>
<td>No</td>
<td>Yes</td>
</tr>
<tr>
<td>Sign</td>
<td>Always positive</td>
<td>Positive or negative</td>
</tr>
</tbody>
</table>
<p><strong>Distance</strong> tells you how far something traveled.</p>
<p><strong>Position</strong> tells you <em>where</em> something is.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="35" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="an-example">An Example</h2>
<p>Imagine you stand at a piece of tape on the floor.</p>
<p>You walk <strong>3 meters to the right</strong>.</p>
<ul>
<li>Distance traveled: <strong>3 m</strong></li>
<li>Position: <strong>+3 m</strong></li>
</ul>
<p>Now start over. Walk <strong>3 meters to the left</strong>.</p>
<ul>
<li>Distance traveled: <strong>3 m</strong></li>
<li>Position: <strong>-3 m</strong></li>
</ul>
<p>Same distance. Very different positions.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="36" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="what-is-a-coordinate-system">What Is a Coordinate System?</h2>
<p>To measure <strong>position</strong>, you need two things:</p>
<p><strong>1. An origin</strong> — a reference point where position = 0</p>
<p><strong>2. A positive direction</strong> — one direction you call positive; the other is negative</p>
<blockquote>
<p>This is just like a number line. The origin is zero, positive is to the right, negative is to the left.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="37" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="setting-up-your-coordinate-system">Setting Up Your Coordinate System</h2>
<p>In this lab, you will:</p>
<ul>
<li>Mark your <strong>origin</strong> on the floor with tape</li>
<li>Choose and label a <strong>positive direction</strong></li>
<li>Send your buggy in the <strong>opposite</strong> direction</li>
</ul>
<p>Your buggy travels in the <strong>negative direction</strong>.</p>
<p>Every position you record will be a <strong>negative number</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="38" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="what-will-your-data-look-like">What Will Your Data Look Like?</h2>
<table>
<thead>
<tr>
<th>Time (s)</th>
<th>Position, Trial 1 (cm)</th>
<th>Position, Trial 2 (cm)</th>
<th>Average (cm)</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>-28</td>
<td>-26</td>
<td>-27</td>
</tr>
<tr>
<td>2</td>
<td>-54</td>
<td>-55</td>
<td>-54.5</td>
</tr>
<tr>
<td>3</td>
<td>-81</td>
<td>-83</td>
<td>-82</td>
</tr>
<tr>
<td>...</td>
<td>...</td>
<td>...</td>
<td>...</td>
</tr>
</tbody>
</table>
<p>All position values are <strong>negative</strong> and getting <strong>more negative</strong> over time.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="39" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="what-will-your-graph-look-like">What Will Your Graph Look Like?</h2>
<p>In Lab 1, your graph went <strong>up</strong> (distance increased over time).</p>
<p>In this lab, your position values get more and more <strong>negative</strong>.</p>
<p>Your best-fit line will slope <strong>downward</strong>.</p>
<blockquote>
<p>The slope of your line will be a <strong>negative number</strong>.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="40" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="speed-vs-velocity">Speed vs. Velocity</h2>
<p>In Lab 1, your slope represented <strong>speed</strong> — how fast the buggy moved.</p>
<p>In this lab, your slope represents <strong>velocity</strong>.</p>
<table>
<thead>
<tr>
<th></th>
<th>Speed</th>
<th>Velocity</th>
</tr>
</thead>
<tbody>
<tr>
<td>Tells you</td>
<td>How fast</td>
<td>How fast <em>and which direction</em></td>
</tr>
<tr>
<td>Sign</td>
<td>Always positive</td>
<td>Positive or negative</td>
</tr>
</tbody>
</table>
<p>A <strong>negative velocity</strong> means the object is moving in the <strong>negative direction</strong>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="41" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="your-task">Your Task</h2>
<ol>
<li>Set up a <strong>coordinate system</strong> (origin + positive direction)</li>
<li>Send your buggy in the <strong>negative direction</strong></li>
<li>Collect <strong>position vs. time</strong> data (multiple trials)</li>
<li>Graph <strong>position vs. time</strong> and draw a best-fit line</li>
<li>Write the <strong>equation</strong> of your line</li>
<li>Use your equation to <strong>predict</strong> the time to reach an assigned position</li>
<li><strong>Test</strong> your prediction</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="42" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
<h2 id="before-you-start">Before You Start</h2>
<p>Things to remember:</p>
<ul>
<li>Every position value should be <strong>negative</strong></li>
<li>Start the buggy <strong>before</strong> the origin so it's at full speed</li>
<li>Collect data for <strong>many</strong> different time values</li>
<li>Run <strong>multiple trials</strong> at each time and average</li>
<li>Take your time — you need a good equation for your prediction</li>
</ul>
<p><strong>Go!</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-class="green" data-theme="physicalSci" lang="C" class="green" data-marpit-pagination="43" style="--paginate:true;--class:green;--theme:physicalSci;" data-marpit-pagination-total="74">
